<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Интерактив — Моя страничка</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <div class="wrapper">
    <nav class="topbar-nav">
      <a href="index.html">главная</a>
      <a href="gallery.html">галерея</a>
      <a href="projects.html">проекты</a>
      <a href="posts.html" class="on">интерактив</a>
    </nav>
  </div>
</div>

<!-- HEADER -->
<div class="wrapper page-title">
  <h1>Интерактив</h1>
  <p class="gallery-subtitle">Оно <span class="shimmer-text">РАБОТАЕТ</span></p>
  <p class="gallery-update-note">Новости, мысли, чэнджлоги...</p>
</div>

<!-- POSTS UI -->
<div class="posts-toolbar" id="postsToolbar"></div>
<div class="posts-count" id="postsCount"></div>
<div id="postsFeed"></div>

<!-- FOOTER -->
<footer class="ft">
  <div class="wrapper">
    <div class="ft-l">
      Передаю привет Маратко · <span id="year"></span>
    </div>
    <div class="ft-r">сделано с .html</div>
  </div>
</footer>

<script src="posts.js"></script>

<style>
.posts-toolbar{
  display:flex;
  gap:8px;
  justify-content:center;
  flex-wrap:wrap;
  margin:16px 0;
}

.posts-toolbar button{
  background:#1c1c1c;
  border:1px solid #333;
  color:#ddd;
  padding:6px 14px;
  border-radius:20px;
  cursor:pointer;
}

.posts-toolbar button.active{
  background:#4a4af0;
  border-color:#4a4af0;
  color:white;
}

.posts-count{
  text-align:center;
  opacity:.7;
  margin-bottom:10px;
}

.post-card{
  max-width:640px;
  margin:0 auto 18px;
  padding:16px;
  background:#161616;
  border:1px solid #2a2a2a;
  border-radius:14px;
}

.post-tag{
  display:inline-block;
  font-size:11px;
  padding:2px 8px;
  border-radius:10px;
  background:#2b2b40;
  color:#9fa8ff;
  margin-bottom:8px;
}

.post-meta{
  font-size:12px;
  opacity:.6;
  margin-bottom:10px;
}

.post-image{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

.post-body{
  white-space:pre-wrap;
}
</style>

<script>
let activeTag = "все";

document.getElementById("year").textContent = new Date().getFullYear();

function formatDate(date, time){
  return new Date(date + "T" + time).toLocaleDateString("ru-RU", {
    day:"2-digit",
    month:"long",
    year:"numeric"
  }) + " · " + time;
}

function getTags(){
  return ["все", ...new Set(posts.map(p => p.tag).filter(Boolean))];
}

function renderToolbar(){
  const el = document.getElementById("postsToolbar");
  el.innerHTML = "";

  getTags().forEach(tag => {
    const btn = document.createElement("button");
    btn.textContent = tag;

    if(tag === activeTag) btn.classList.add("active");

    btn.onclick = () => {
      activeTag = tag;
      render();
    };

    el.appendChild(btn);
  });
}

function render(){
  renderToolbar();

  const list = activeTag === "все"
    ? posts
    : posts.filter(p => p.tag === activeTag);

  document.getElementById("postsCount").textContent =
    `Постов: ${list.length}`;

  const feed = document.getElementById("postsFeed");

  if(!list.length){
    feed.innerHTML = "<div style='text-align:center;opacity:.6'>Пусто</div>";
    return;
  }

  const sorted = [...list].sort((a,b) =>
    (b.date + b.time).localeCompare(a.date + a.time)
  );

  feed.innerHTML = sorted.map(p => `
    <div class="post-card">
      ${p.tag ? `<div class="post-tag">${p.tag}</div>` : ""}
      <h3>${p.title}</h3>
      <div class="post-meta">${formatDate(p.date, p.time)}</div>
      ${p.image ? `<img class="post-image" src="${p.image}">` : ""}
      <div class="post-body">${p.text || ""}</div>
    </div>
  `).join("");
}

render();
</script>

</body>
</html>
