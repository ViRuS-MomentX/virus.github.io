<style>
.posts-toolbar{
  display:flex; gap:8px; flex-wrap:wrap;
  justify-content:center; margin:16px 0;
}

.posts-toolbar button{
  background:#1c1c1c;
  color:#ddd;
  border:1px solid #333;
  padding:6px 14px;
  border-radius:20px;
  cursor:pointer;
}

.posts-toolbar button.active{
  background:#4a4af0;
  color:#fff;
  border-color:#4a4af0;
}

.posts-count{
  text-align:center;
  opacity:.7;
  margin-bottom:10px;
}

.post-card{
  max-width:640px;
  margin:0 auto 18px;
  padding:16px;
  background:#161616;
  border:1px solid #2a2a2a;
  border-radius:14px;
}

.post-tag{
  font-size:11px;
  padding:2px 8px;
  background:#2b2b40;
  color:#9fa8ff;
  border-radius:10px;
  display:inline-block;
  margin-bottom:8px;
}

.post-meta{
  font-size:12px;
  opacity:.6;
  margin-bottom:10px;
}

.post-image{
  width:100%;
  border-radius:10px;
  margin:10px 0;
}

.post-body{
  white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="posts-toolbar" id="postsToolbar"></div>
<div class="posts-count" id="postsCount"></div>
<div id="postsFeed"></div>

<script src="posts.js"></script>

<script>
let activeTag = "все";

function formatDate(date, time){
  const d = new Date(date + "T" + time);
  return d.toLocaleDateString("ru-RU", {
    day:"2-digit",
    month:"long",
    year:"numeric"
  }) + " · " + time;
}

function getTags(){
  return ["все", ...new Set(posts.map(p => p.tag).filter(Boolean))];
}

function renderToolbar(){
  const el = document.getElementById("postsToolbar");
  const tags = getTags();

  el.innerHTML = "";

  tags.forEach(tag => {
    const btn = document.createElement("button");
    btn.textContent = tag;
    if(tag === activeTag) btn.classList.add("active");

    btn.onclick = () => {
      activeTag = tag;
      render();
    };

    el.appendChild(btn);
  });
}

function render(){
  renderToolbar();

  const list = activeTag === "все"
    ? posts
    : posts.filter(p => p.tag === activeTag);

  document.getElementById("postsCount").textContent =
    "Постов: " + list.length;

  const feed = document.getElementById("postsFeed");

  if(list.length === 0){
    feed.innerHTML = "<div style='text-align:center;opacity:.6'>Пусто</div>";
    return;
  }

  feed.innerHTML = list
    .slice()
    .sort((a,b)=> new Date(b.date) - new Date(a.date))
    .map(p => `
      <div class="post-card">
        ${p.tag ? `<div class="post-tag">${p.tag}</div>` : ""}
        <h3>${p.title}</h3>
        <div class="post-meta">${formatDate(p.date, p.time)}</div>
        ${p.image ? `<img class="post-image" src="${p.image}">` : ""}
        <div class="post-body">${p.text || ""}</div>
      </div>
    `)
    .join("");
}

render();
</script>

</body>
</html>
