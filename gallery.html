</div>

<div id="lightbox">
    <span class="close-btn">&times;</span>
    <div class="lightbox-content">
        <img src="" alt="Увеличенное фото" id="lightboxImg" style="display: none;" />
        <div class="placeholder-text" id="lightboxPlaceholder" style="display: none;">Фото отсутствует</div>
        <div class="lightbox-comment" id="lightboxComment"></div>
    </div>
</div>

    { name: 'дарова.jpg', comment: 'Не туда зашёл', game: 'roblox' },
    { name: 'годжо.jpg', comment: '20:31. Прибыл Годжо Сатору', game: 'roblox' },

    { name: 'самолёт.jpg', comment: 'От-вин-та', game: 'minecraft' },

    { name: 'катаклизм.jpg', comment: 'И поспешил царь в Шамаханское царство', game: 'minecraft' },
    { name: 'дино.jpg', comment: 'Все динозавары боялись т-рекса', game: 'phasmo' },
    { name: 'охота.jpg', comment: 'Двое лучших гостхантеров вышли на охоту', game: 'phasmo' },
    { name: 'рука.png', comment: 'Полтергейст оторвал ему ноги', game: 'phasmo' },
    { name: 'машина.png', comment: 'Полтергейст задавил моего друга', game: 'phasmo' },
    { name: 'лысый.png', comment: 'Гоняем лысого', game: 'phasmo' },
    { name: 'зарядка.png', comment: 'Полтергейст свернул ему ноги', game: 'phasmo' },

    { name: 'IMG_20260624_140422_709.jpg', comment: 'Только зашëл в хардкорный мир, а тут уже встречают', game: 'minecraft' },
    { name: 'IMG_20260624_142151_960.jpg', comment: 'Первый день работы админом коту под хвост', game: 'minecraft' },
    { name: 'IMG_20260624_142055_177.jpg', comment: 'Поганец вирус опять ломает сервер', game: 'minecraft' }
];

    const totalSlots = galleryData.length;
    const grid = document.getElementById('galleryGrid');
    let activeGame = '';

    // === ФУНКЦИЯ ГЕНЕРАЦИИ КАРТОЧЕК С УЧЁТОМ ПОИСКА ===
    function renderGallery(searchText = '') {
        grid.innerHTML = '';
        let visibleCount = 0;

        galleryData.forEach((item, index) => {
            const comment = item.comment;
            const imageName = item.name;
            if (
    activeGame &&
    item.game !== activeGame
) {
    return;
}

            // Поиск по комментарию (без учёта регистра)
            if (searchText.trim() !== '' && !comment.toLowerCase().includes(searchText.toLowerCase())) return;

            visibleCount++;

            const card = document.createElement('div');
            card.className = 'gallery-item';
            card.dataset.comment = comment;

            const thumb = document.createElement('div');
            thumb.style.width = '100%';
            thumb.style.height = '200px';
            thumb.style.backgroundColor = '#2a2a2a';
            thumb.style.display = 'flex';
            thumb.style.alignItems = 'center';
            thumb.style.justifyContent = 'center';
            thumb.style.color = '#666';
            thumb.style.fontSize = '1rem';
            thumb.style.fontWeight = '500';

            if (imageName) {
                const img = document.createElement('img');
                img.src = imageName;
                img.alt = `Фото ${index+1}`;
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'cover';
                img.style.display = 'block';
                thumb.appendChild(img);
            } else {
                thumb.textContent = `Фото ${index+1}`;
            }

            const desc = document.createElement('div');
            desc.className = 'desc';
            desc.textContent = comment;

            card.appendChild(thumb);
            card.appendChild(desc);
            grid.appendChild(card);
        });

        // Обновляем счётчик
        document.getElementById('photoCounter').textContent = `Показано: ${visibleCount} / ${totalSlots}`;
    }

    // === ПОИСК ===
    document.getElementById('searchInput').addEventListener('input', function() {
        renderGallery(this.value);
    });

    // === ИНИЦИАЛИЗАЦИЯ ===
    document
.querySelectorAll('.game-filter')
.forEach(button => {

    button.addEventListener('click', () => {

        const game = button.dataset.game;

        if (activeGame === game) {
            activeGame = '';
        } else {
            activeGame = game;
        }

        document
        .querySelectorAll('.game-filter')
        .forEach(btn =>
            btn.classList.remove('active')
        );

        if (activeGame) {
            button.classList.add('active');
        } else {
            document
            .querySelector('[data-game=""]')
            .classList.add('active');
        }

        renderGallery(
            document.getElementById('searchInput').value
        );

    });

});
    renderGallery('');

    // === LIGHTBOX ===
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxPlaceholder = document.getElementById('lightboxPlaceholder');
    const lightboxComment = document.getElementById('lightboxComment');
    const closeBtn = document.querySelector('.close-btn');

    function openLightbox(src, comment) {
        if (src) {
            lightboxImg.src = src;
            lightboxImg.style.display = 'block';
            lightboxPlaceholder.style.display = 'none';
        } else {
            lightboxImg.style.display = 'none';
            lightboxPlaceholder.style.display = 'block';
        }

        if (comment) {
            lightboxComment.textContent = comment;
            lightboxComment.style.display = 'block';
        } else {
            lightboxComment.style.display = 'none';
        }

        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        lightbox.classList.remove('active');
        document.body.style.overflow = '';
        lightboxComment.textContent = '';
    }

    grid.addEventListener('click', (e) => {
        const card = e.target.closest('.gallery-item');
        if (!card) return;
        const img = card.querySelector('img');
        const comment = card.dataset.comment || '';
        if (img) {
            openLightbox(img.src, comment);
        } else {
            openLightbox(null, comment);
        }
    });

    lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) closeLightbox();
    });

    closeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        closeLightbox();
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && lightbox.classList.contains('active')) {
            closeLightbox();
        }
    });

    lightboxImg.addEventListener('click', (e) => e.stopPropagation());
    lightboxPlaceholder.addEventListener('click', (e) => e.stopPropagation());
    lightboxComment.addEventListener('click', (e) => e.stopPropagation());
</script>
