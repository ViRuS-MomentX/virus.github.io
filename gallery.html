<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Галерея — Моя страничка</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ═══ TOP BAR ═══ -->
<div class="topbar">
    <div class="wrapper">
        <nav class="topbar-nav">
            <a href="index.html">главная</a>
            <a href="gallery.html" class="on">галерея</a>
            <a href="projects.html">проекты</a>
        </nav>
    </div>
</div>

<!-- ═══ GALLERY HEADER ═══ -->
<div class="wrapper page-title">
    <h1>Галерея</h1>
    <p class="gallery-subtitle">Мои <span class="shimmer-text">ШЕДЕВРЫ</span></p>
    <p class="gallery-update-note">📸 Фото пополняются каждый день (если не лень)</p>
</div>

<!-- ═══ ПОИСК (по центру) ═══ -->
<div class="wrapper gallery-controls">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 Искать по комментарию..." />
    </div>
    <div class="photo-counter" id="photoCounter">Показано: 0 / 0</div>
</div>

<!-- ═══ СЕТКА ГАЛЕРЕИ ═══ -->
<div class="wrapper">
    <div class="gallery-grid" id="galleryGrid"></div>
</div>

<!-- ═══ FOOTER ═══ -->
<footer class="ft">
    <div class="wrapper">
        <div class="ft-l">
            <div class="ft-d"></div> Моя страничка · <span id="year"></span>
        </div>
        <div class="ft-r">сделано с .html</div>
    </div>
</footer>

<!-- ═══ LIGHTBOX ═══ -->
<div id="lightbox">
    <span class="close-btn">&times;</span>
    <div class="lightbox-content">
        <img src="" alt="Увеличенное фото" id="lightboxImg" style="display: none;" />
        <div class="placeholder-text" id="lightboxPlaceholder" style="display: none;">Фото отсутствует</div>
        <div class="lightbox-comment" id="lightboxComment"></div>
    </div>
</div>

<script>
    // === ГОД В ФУТЕРЕ ===
    document.getElementById('year').textContent = new Date().getFullYear();

    // === ДАННЫЕ ГАЛЕРЕИ (каждое фото — объект) ===
    // Здесь вы сами будете добавлять теги в поле tags, если хотите фильтровать,
    // но кнопки фильтров я убрал. Если хотите их вернуть — допишем отдельно.
    const galleryData = [
        { name: 'фух.jpg', comment: 'От судьбы не убежишь' },
        { name: 'фармилка.jpg', comment: 'Обиделся, видимо' },
        { name: 'только не в жопу.jpg', comment: 'Только не в дырку' },
        { name: 'таракан.jpg', comment: 'Так быстро пластинку я ещё никогда не нёс' },
        { name: 'сушка.jpg', comment: 'Страшно' },
        { name: 'рыбка.jpg', comment: 'Рыбалка зашла слишком далеко' },
        { name: 'предательство.jpg', comment: 'Ножом в спину' },
        { name: 'пинг.jpg', comment: '10 МИЛЛИОНОВ ГРАВИЯ ДОСТАВКОЙ В АД!' },
        { name: 'китаец.jpg', comment: 'Китаец делал этот спуск' },
        { name: 'джефф.jpg', comment: 'Лучший мой портал' },
        { name: 'бамбук.jpg', comment: 'А так хотелось' },
        { name: 'арт.jpg', comment: 'Не надо было пить то зелье...' },
        { name: 'античит.jpg', comment: 'Проверка античита' },
        { name: 'смотрящий.jpg', comment: 'Сквад-ворлд. Золотые времена' },
        { name: 'зима.jpg', comment: 'Куда идём мы с пятачком' },
        { name: 'шахта.jpg', comment: 'Копаем' },
        { name: 'англия.jpg', comment: 'Чёртов английский' },
        { name: 'араб.jpg', comment: 'Арабская мольба о помощи' },
        { name: 'извращенец.jpg', comment: 'Извращённый взгляд Рафаэля' },
        { name: 'нагрузка.jpg', comment: 'Вирус - реально вирус' },
        { name: 'опомнился.jpg', comment: 'Опомнился' },
        { name: 'паук.jpg', comment: 'Мой подарок мейнеру паука на НГ' },
        { name: 'тайлер.jpg', comment: 'Тайлера здесь нет' },
        { name: 'лост.jpg', comment: 'Следующие часы будут незабываемыми' },
        { name: 'христос.png', comment: 'Второе пришествие Христа' },
        { name: 'состав.png', comment: 'Куда таким составом' },
        { name: 'крипер.png', comment: 'Орешник направляется по курсу к дому Маратко' },
        { name: 'касперский.png', comment: 'Похоронил мученика' },
        { name: 'вардены.jpg', comment: 'Нюхачи расплодились' },
        { name: 'внедра.jpg', comment: 'Воздушный дайвер' },
        { name: 'самолёт.jpg', comment: 'Кто мечтает быть пилотом\nОчень смелый видно тот\nПотому что только смелый\nСам полезет в самолёт' },
        { name: 'катаклизм.jpg', comment: 'Вооздушно-оборонительные войска' },
        { name: 'дино.jpg', comment: 'Все динозавары боялись т-рекса' },
        { name: 'охота.jpg', comment: 'Двое лучших гостхантеров вышли на охоту\nБойся нас, Полтергейст' },
        { name: 'рука.png', comment: 'Полтергейст оторвал ему ноги' },
        { name: 'машина.png', comment: 'Полтергейст задавил моего друга' },
        { name: 'лысый.png', comment: 'Гоняем лысого' },
        { name: 'зарядка.png', comment: 'Полтергейст свернул ему ноги' }
    ];

    const totalSlots = galleryData.length;
    const grid = document.getElementById('galleryGrid');

    // === ФУНКЦИЯ ГЕНЕРАЦИИ КАРТОЧЕК С УЧЁТОМ ПОИСКА ===
    function renderGallery(searchText = '') {
        grid.innerHTML = '';
        let visibleCount = 0;

        galleryData.forEach((item, index) => {
            const comment = item.comment;
            const imageName = item.name;

            // Поиск по комментарию (без учёта регистра)
            if (searchText.trim() !== '' && !comment.toLowerCase().includes(searchText.toLowerCase())) return;

            visibleCount++;

            const card = document.createElement('div');
            card.className = 'gallery-item';
            card.dataset.comment = comment;

            const thumb = document.createElement('div');
            thumb.style.width = '100%';
            thumb.style.height = '200px';
            thumb.style.backgroundColor = '#2a2a2a';
            thumb.style.display = 'flex';
            thumb.style.alignItems = 'center';
            thumb.style.justifyContent = 'center';
            thumb.style.color = '#666';
            thumb.style.fontSize = '1rem';
            thumb.style.fontWeight = '500';

            if (imageName) {
                const img = document.createElement('img');
                img.src = imageName;
                img.alt = `Фото ${index+1}`;
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'cover';
                img.style.display = 'block';
                thumb.appendChild(img);
            } else {
                thumb.textContent = `Фото ${index+1}`;
            }

            const desc = document.createElement('div');
            desc.className = 'desc';
            desc.textContent = comment;

            card.appendChild(thumb);
            card.appendChild(desc);
            grid.appendChild(card);
        });

        // Обновляем счётчик
        document.getElementById('photoCounter').textContent = `Показано: ${visibleCount} / ${totalSlots}`;
    }

    // === ПОИСК ===
    document.getElementById('searchInput').addEventListener('input', function() {
        renderGallery(this.value);
    });

    // === ИНИЦИАЛИЗАЦИЯ ===
    renderGallery('');

    // === LIGHTBOX ===
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxPlaceholder = document.getElementById('lightboxPlaceholder');
    const lightboxComment = document.getElementById('lightboxComment');
    const closeBtn = document.querySelector('.close-btn');

    function openLightbox(src, comment) {
        if (src) {
            lightboxImg.src = src;
            lightboxImg.style.display = 'block';
            lightboxPlaceholder.style.display = 'none';
        } else {
            lightboxImg.style.display = 'none';
            lightboxPlaceholder.style.display = 'block';
        }

        if (comment) {
            lightboxComment.textContent = comment;
            lightboxComment.style.display = 'block';
        } else {
            lightboxComment.style.display = 'none';
        }

        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        lightbox.classList.remove('active');
        document.body.style.overflow = '';
        lightboxComment.textContent = '';
    }

    grid.addEventListener('click', (e) => {
        const card = e.target.closest('.gallery-item');
        if (!card) return;
        const img = card.querySelector('img');
        const comment = card.dataset.comment || '';
        if (img) {
            openLightbox(img.src, comment);
        } else {
            openLightbox(null, comment);
        }
    });

    lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) closeLightbox();
    });

    closeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        closeLightbox();
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && lightbox.classList.contains('active')) {
            closeLightbox();
        }
    });

    lightboxImg.addEventListener('click', (e) => e.stopPropagation());
    lightboxPlaceholder.addEventListener('click', (e) => e.stopPropagation());
    lightboxComment.addEventListener('click', (e) => e.stopPropagation());
</script>
</body>
</html>
